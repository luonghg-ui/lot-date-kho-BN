    <style>
        /* Custom Styles for Modern Dashboard & Sidebar */
        :root {
            --sidebar-width: 100px;
        }
        body {
            background-color: #080c14;
            color: #f8fafc;
            font-family: 'Inter', 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .app-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
        }
        
        /* Sidebar styling */
        .sidebar {
            width: var(--sidebar-width);
            background: #0d1220;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            flex-shrink: 0;
            justify-content: space-between;
        }
        .sidebar-brand {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
            margin-bottom: 32px;
        }
        .sidebar-brand i, .sidebar-brand svg {
            width: 24px;
            height: 24px;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
            flex-grow: 1;
        }
        .sidebar-item {
            width: 76px;
            height: 76px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #64748b;
            text-decoration: none;
            gap: 6px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }
        .sidebar-item i, .sidebar-item svg {
            width: 22px;
            height: 22px;
            transition: transform 0.3s;
        }
        .sidebar-item span {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .sidebar-item:hover {
            color: #a78bfa;
            background: rgba(168, 85, 247, 0.08);
        }
        .sidebar-item:hover i, .sidebar-item:hover svg {
            transform: scale(1.1);
        }
        .sidebar-item.active {
            color: #ffffff;
            background: rgba(139, 92, 246, 0.18);
            border: 1px solid rgba(139, 92, 246, 0.25);
            box-shadow: inset 0 0 12px rgba(139, 92, 246, 0.1);
        }
        .sidebar-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-align: center;
        }
        .status-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .status-label {
            font-size: 9px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .status-name {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            line-height: 1.2;
        }
        
        /* Main view wrapper */

            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            max-height: 100vh;
