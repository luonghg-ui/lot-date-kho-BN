<body>
    <div class="mesh-bg"></div>
    <header class="top-bar">
        <div class="brand">
            <div class="brand-icon"><i data-lucide="calendar"></i></div>
            <div class="brand-text">
                <h1>Sản Phẩm Cận Date</h1>
                <p>Lọc sản phẩm có HSD dưới 1 năm</p>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
            <button class="btn-export-global" id="exportBtn" style="background:rgba(245,158,11,0.1); color:#F59E0B; border:1px solid rgba(245,158,11,0.3); padding:10px 20px; border-radius:12px; font-family:var(--font-display); font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:10px; cursor:pointer; transition:all 0.3s;">
                <i class='bx bxs-file-export'></i>
                <span>Xuất Excel</span>
            </button>
            <button class="btn-export-global" id="exportTemplateBtn" style="background:rgba(16,185,129,0.1); color:#10B981; border:1px solid rgba(16,185,129,0.3); padding:10px 20px; border-radius:12px; font-family:var(--font-display); font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:10px; cursor:pointer; transition:all 0.3s;">
                <i class='bx bx-clipboard'></i>
                <span>Tải Mẫu Kiểm Kê</span>
            </button>
            <button class="theme-toggle" id="themeToggle" title="Chế độ sáng/tối">
                <i class='bx bx-sun'></i>
            </button>
            <button class="btn-page-nav" onclick="openPageNavigator()" title="Chuyển trang">
                <i class='bx bx-layer'></i>
            </button>
            <button class="btn-token" id="tokenBtn" title="Token WMS">
                <i class='bx bx-key'></i>
            </button>
            <button class="btn-refresh" id="refreshBtn">
                <i class='bx bx-refresh'></i>
                <span>Làm mới</span>
            </button>
        </nav>
    </header>

    <div class="token-panel" id="tokenPanel" style="display:none;">
        <div class="token-panel-header">
            <span><i class='bx bx-key'></i> Token WMS</span>
            <button class="token-panel-close" id="tokenPanelClose">&times;</button>
        </div>
        <div class="token-panel-body">
            <div class="token-row">
                <label>Paste cookie string từ DevTools → Application → Cookies:</label>
                <textarea id="tokenCookieInput" rows="3" placeholder="_fbp=...; SID=...; session_token=..."></textarea>
            </div>
            <div class="token-row">
                <button class="btn-token-extract" id="tokenExtractBtn">Trích xuất & Lưu</button>
                <button class="btn-token-test" id="tokenTestBtn">Kiểm tra proxy</button>
            </div>
            <div class="token-extracted" id="tokenExtracted" style="display:none;">
                <div class="token-field"><strong>SID:</strong> <code id="tokenSidDisplay"></code></div>
                <div class="token-field"><strong>Token:</strong> <code id="tokenTokenDisplay"></code></div>
                <div class="token-field" id="tokenExtractStatus"></div>
            </div>
            <div class="token-test-result" id="tokenTestResult" style="display:none;"></div>
        </div>
    </div>

    <div class="page-wrapper">
        <div class="stats-row">
            <div class="stat-card" style="cursor:default;">
                <div class="stat-icon blue"><i class='bx bx-package'></i></div>
                <div class="stat-label">Tổng SKU</div>
                <div class="stat-value" id="statTotal">—</div>
            </div>
            <div class="stat-card" style="cursor:default;">
                <div class="stat-icon yellow"><i class='bx bx-time-five'></i></div>
                <div class="stat-label">Khẩn cấp (&lt; 90 ngày)</div>
                <div class="stat-value" id="statUrgent">—</div>
            </div>
            <div class="stat-card" style="cursor:default;">
                <div class="stat-icon green"><i class='bx bx-calendar-check'></i></div>
                <div class="stat-label">Cảnh báo (90–180 ngày)</div>
                <div class="stat-value" id="statWarning">—</div>
            </div>
            <div class="stat-card" style="cursor:default;">
                <div class="stat-icon blue"><i class='bx bx-calendar'></i></div>
                <div class="stat-label">Chú ý (180–365 ngày)</div>
                <div class="stat-value" id="statNotice">—</div>
            </div>
        </div>

        <div id="statusBanner" style="display:none;">
            <div class="banner loading" id="bannerInner">
                <i class='bx bx-loader-alt bx-spin'></i>
                <span>Đang tải dữ liệu sản phẩm...</span>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-wrap">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Tìm theo SKU hoặc tên sản phẩm...">
            </div>
            <select class="filter-select" id="dateFilter">
                <option value="all">Tất cả (&lt; 365 ngày)</option>
                <option value="urgent">Khẩn cấp (&lt; 90 ngày)</option>
                <option value="warning">Cảnh báo (90–180 ngày)</option>
                <option value="notice">Chú ý (180–365 ngày)</option>
            </select>
            <div class="result-badge" id="resultBadge">Đang tải...</div>
        </div>

        <div class="table-wrap">
            <div class="table-scroll">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width:50px; text-align:center;">#</th>
                            <th style="width:60px;"></th>
                            <th data-col="name" id="thName">Sản phẩm / SKU <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th data-col="lot" id="thLot">Lot <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th data-col="exp" id="thExp">HSD <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th data-col="days" id="thDays">Còn lại <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                            <th>Vị trí</th>
                            <th data-col="qty" id="thQty">SL <i class='bx bx-sort-alt-2 sort-icon'></i></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" style="padding:100px; text-align:center; color:var(--text-dim);">Đang tải dữ liệu từ hệ thống...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination-wrap" id="paginationWrap" style="display:none;">
                <div class="page-info" id="pageInfo"></div>
                <div class="page-btns" id="pageBtns"></div>
            </div>
        </div>
    </div>

    <script src="../assets/js/page-nav.js"></script>
    <script src="../assets/js/script-candate.js"></script>
    <script>document.addEventListener('DOMContentLoaded',()=>{try{if(typeof lucide!=='undefined')lucide.createIcons()}catch(e){}});</script>
</body>
</html>
