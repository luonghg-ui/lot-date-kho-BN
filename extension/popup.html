<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 360px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
        }
        .badge.on { background: #059669; color: #fff; }
        .badge.off { background: #dc2626; color: #fff; }
        .badge.wait { background: #d97706; color: #fff; }
        .section {
            background: #1e293b;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .section label {
            display: block;
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .section .value {
            font-size: 13px;
            word-break: break-all;
            font-family: 'Consolas', monospace;
        }
        .section .value.tkn {
            color: #fbbf24;
            font-size: 11px;
            max-height: 60px;
            overflow: hidden;
            position: relative;
        }
        .section .value.tkn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(transparent, #1e293b);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: #4f46e5;
            color: #fff;
            transition: background .2s;
            margin-bottom: 8px;
        }
        .btn:hover { background: #6366f1; }
        .btn:active { background: #4338ca; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn.secondary { background: #334155; }
        .btn.secondary:hover { background: #475569; }
        .status {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 8px;
        }
        .status.ok { color: #34d399; }
        .status.err { color: #f87171; }
        .footer {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 12px;
        }
        input[type="text"] {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 12px;
            font-family: 'Consolas', monospace;
            outline: none;
        }
        input[type="text"]:focus { border-color: #4f46e5; }
        .row { display: flex; gap: 8px; align-items: center; }
        .row .btn { margin-bottom: 0; width: auto; padding: 6px 12px; font-size: 12px; }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: #475569; border-radius: 10px; transition: .3s;
        }
        .slider::before {
            content: ''; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px;
            background: #fff; border-radius: 50%; transition: .3s;
        }
        input:checked + .slider { background: #4f46e5; }
        input:checked + .slider::before { transform: translateX(16px); }
        .auto-row { display: flex; align-items: center; justify-content: space-between; }
    </style>

<body>
    <div class="header">
        <h1>WMS Token Sync</h1>
        <span class="badge off" id="statusBadge">Chưa kết nối</span>
    </div>

    <div class="section">
        <label>Proxy URL</label>
        <div class="row">
            <input type="text" id="proxyUrl" value="http://localhost:8081">
            <button class="btn secondary" id="saveUrl">Lưu</button>
        </div>
    </div>

    <div class="section">
        <label>SID</label>
        <div class="value tkn" id="sidDisplay">-</div>
    </div>

    <div class="section">
        <label>Session Token</label>
        <div class="value tkn" id="tokenDisplay">-</div>
    </div>

    <div class="section auto-row">
        <label style="margin:0;">Tự động đồng bộ</label>
        <label class="switch">
            <input type="checkbox" id="autoSync">
            <span class="slider"></span>
        </label>
    </div>

    <button class="btn" id="syncBtn">&#x21bb; Đồng bộ Token ngay</button>
    <div class="status" id="statusMsg">Nhấn "Đồng bộ" để lấy token từ internal.thuocsi.vn</div>
    <div class="footer">WMS Inventory Tool</div>

    <script src="popup.js"></script>
</body>
